# 1. Configuración de la base de datos en memoria (H2)
spring.datasource.url=jdbc:h2:mem:redsocialdb
spring.datasource.username=sa
spring.datasource.password=

# 2. Habilitar la consola web de H2 para que puedas hacer consultas manuales
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 3. Hibernate: Crear y actualizar las tablas automáticamente a partir de tus clases @Entity
spring.jpa.hibernate.ddl-auto=update

# 4. CRÍTICO: Obligar a Spring Boot a crear las tablas ANTES de insertar los datos
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always